name: 1Password Rotation Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install 1Password CLI
        run: |
          curl -sSfo op.zip "https://cache.agilebits.com/dist/1P/op2/pkg/v2.24.0/op_linux_amd64_v2.24.0.zip"
          unzip -o op.zip -d /usr/local/bin
          rm op.zip
          op --version

      - name: Run Rotation Audit
        shell: bash
        run: bash scripts/onepassword-rotation-audit.sh

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-report
          path: reports/secret-rotation/
          retention-days: 30
