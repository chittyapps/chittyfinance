# ChittyConnect Configuration for ChittyFinance
# @canon: chittycanon://core/services/chittyfinance

service:
  name: chittyfinance
  display_name: ChittyFinance
  type: service
  tier: 3
  organization: CHITTYAPPS
  chitty_id: ${CHITTYFINANCE_SERVICE_ID}
  domains:
    production: finance.chitty.cc

onboarding:
  endpoint: https://get.chitty.cc/api/onboard
  provisions: [chitty_id, service_token, certificate, trust_chain]
  context_consciousness:
    enabled: true
    session_binding: required
  chittydna:
    enabled: true
    identity_lineage: required
  memorycloude:
    enabled: true
    memory_policy: required
  synthetic_entity:
    type: person
    classification: synthetic
    authority_scope: least_privilege
    access_scope: explicit_scopes_only
    actor_binding: required

auth:
  provider: chittyauth
  endpoint: https://auth.chitty.cc
  service_token:
    source: chittyconnect
    key: CHITTY_AUTH_SERVICE_TOKEN

secrets:
  provider: chittyconnect
  vault: 1password
  paths:
    production: op://ChittyOS/chittyfinance-prod

github:
  repository: CHITTYAPPS/chittyfinance

monitoring:
  health:
    endpoint: /health
    interval: 60s
