kind = "web"
previewPath = "/"
title = "ChittyFinance Auditor Engine"
version = "1.0.0"
id = "artifacts/chitty-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20409

[services.development]
run = "pnpm --filter @workspace/chitty-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chitty-finance", "run", "build" ]
publicDir = "artifacts/chitty-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20409"
BASE_PATH = "/"
