# Cloudflare Workers configuration for ChittyFinance (System Mode)
# Root-level config for CF Workers Builds integration
#
# Canonical model: 3 explicit environments (dev, staging, production).
# Bindings (KV, R2, DO, tail_consumers) do NOT inherit from top-level
# into env blocks — each env must carry its own explicit bindings.
# Top-level is used by Workers Builds (bare `wrangler deploy` without --env).

name = "chittyfinance"
main = "server/worker.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

account_id = "0bc21e3a5a9de1a4cc843be9c3e98121"

workers_dev = false

routes = [
  { pattern = "finance.chitty.cc/*", zone_name = "chitty.cc" }
]

[vars]
MODE = "system"
NODE_ENV = "production"
APP_VERSION = "2.0.0"
CHITTYCONNECT_API_BASE = "https://connect.chitty.cc"

[observability]
enabled = true

[[tail_consumers]]
service = "chittytrack"

[build]
command = "npx vite build --outDir dist/public"

[assets]
directory = "dist/public"
binding = "ASSETS"

[limits]
cpu_ms = 50

[[kv_namespaces]]
binding = "FINANCE_KV"
id = "517b63be4d7144c197b5bdf851f12041"
preview_id = "89d0b3bc875e49c4a3a9091de6a080aa"

[[r2_buckets]]
binding = "FINANCE_R2"
bucket_name = "chittyfinance-storage"
preview_bucket_name = "chittyfinance-storage-preview"

[[durable_objects.bindings]]
name = "CF_AGENT"
class_name = "ChittyAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChittyAgent"]

# ─────────────────────────────────────────────────────────────────────
# env.dev — local development via `wrangler dev --env dev`
# Uses preview KV/R2 and workers.dev routing
# ─────────────────────────────────────────────────────────────────────
[env.dev]
name = "chittyfinance-dev"
workers_dev = true

[env.dev.vars]
MODE = "system"
NODE_ENV = "development"
APP_VERSION = "2.0.0"
CHITTYCONNECT_API_BASE = "https://connect.chitty.cc"

[[env.dev.tail_consumers]]
service = "chittytrack"

[[env.dev.kv_namespaces]]
binding = "FINANCE_KV"
id = "89d0b3bc875e49c4a3a9091de6a080aa"

[[env.dev.r2_buckets]]
binding = "FINANCE_R2"
bucket_name = "chittyfinance-storage-preview"

[[env.dev.durable_objects.bindings]]
name = "CF_AGENT"
class_name = "ChittyAgent"

# ─────────────────────────────────────────────────────────────────────
# env.staging — `wrangler deploy --env staging`
# Shares production KV/R2 (no dedicated staging resources yet)
# ─────────────────────────────────────────────────────────────────────
[env.staging]
name = "chittyfinance-staging"
workers_dev = true

[env.staging.vars]
MODE = "system"
NODE_ENV = "staging"
APP_VERSION = "2.0.0"
CHITTYCONNECT_API_BASE = "https://connect.chitty.cc"

[[env.staging.tail_consumers]]
service = "chittytrack"

[[env.staging.kv_namespaces]]
binding = "FINANCE_KV"
id = "517b63be4d7144c197b5bdf851f12041"

[[env.staging.r2_buckets]]
binding = "FINANCE_R2"
bucket_name = "chittyfinance-storage"

[[env.staging.durable_objects.bindings]]
name = "CF_AGENT"
class_name = "ChittyAgent"

# ─────────────────────────────────────────────────────────────────────
# env.production — `wrangler deploy --env production`
# Custom domain routes, production KV/R2, full observability
# ─────────────────────────────────────────────────────────────────────
[env.production]
name = "chittyfinance"
workers_dev = false

routes = [
  { pattern = "finance.chitty.cc/*", zone_name = "chitty.cc" }
]

[env.production.vars]
MODE = "system"
NODE_ENV = "production"
APP_VERSION = "2.0.0"
CHITTYCONNECT_API_BASE = "https://connect.chitty.cc"

[[env.production.tail_consumers]]
service = "chittytrack"

[[env.production.kv_namespaces]]
binding = "FINANCE_KV"
id = "517b63be4d7144c197b5bdf851f12041"

[[env.production.r2_buckets]]
binding = "FINANCE_R2"
bucket_name = "chittyfinance-storage"

[[env.production.durable_objects.bindings]]
name = "CF_AGENT"
class_name = "ChittyAgent"
